<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hallo World Publisher Lab</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      color: #171717;
      background: #f7f7f4;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(720px, calc(100% - 40px));
      padding: 56px 0;
    }

    img {
      width: 96px;
      height: 96px;
      border: 1px solid #d8d8d2;
      background: #fff;
      object-fit: contain;
    }

    h1 {
      margin: 28px 0 12px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      max-width: 620px;
      color: #4b4b45;
      font-size: 18px;
      line-height: 1.6;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 32px;
    }

    a {
      color: #0b5cad;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <img src="hallo-world-tiktok-icon-1024.png" alt="Hallo World Publisher Lab icon">
    <h1>Hallo World Publisher Lab</h1>
    <p>
      Hallo World Publisher Lab helps users manage prepared social media content and publish it only after explicit user approval.
    </p>
    <nav aria-label="Legal pages">
      <a href="terms.html">Terms of Service</a>
      <a href="privacy.html">Privacy Policy</a>
    </nav>
  </main>
</body>
</html>
